<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gestão de Apostas</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:30px;
}

h1{
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,select,button{
padding:8px;
margin:5px;
border-radius:5px;
border:none;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #334155;
text-align:center;
}

.stats{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.stat{
background:#020617;
padding:15px;
border-radius:8px;
flex:1;
text-align:center;
}

canvas{
background:white;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Gestão Profissional de Apostas</h1>

<div class="card">

<h3>Registrar aposta</h3>

Valor
<input id="valor" type="number">

Odd
<input id="odd" type="number" step="0.01">

Resultado
<select id="resultado">
<option value="win">Win</option>
<option value="loss">Loss</option>
</select>

<button onclick="addBet()">Adicionar</button>

</div>

<div class="stats">

<div class="stat">
<h3>Banca</h3>
<p id="banca">0</p>
</div>

<div class="stat">
<h3>Lucro</h3>
<p id="lucro">0</p>
</div>

<div class="stat">
<h3>ROI</h3>
<p id="roi">0%</p>
</div>

<div class="stat">
<h3>Winrate</h3>
<p id="winrate">0%</p>
</div>

</div>

<div class="card">

<h3>Evolução da banca</h3>

<canvas id="grafico"></canvas>

</div>

<div class="card">

<h3>Histórico</h3>

<table>

<thead>
<tr>
<th>#</th>
<th>Valor</th>
<th>Odd</th>
<th>Resultado</th>
<th>Lucro</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

</div>

<script>

let bets = JSON.parse(localStorage.getItem("bets")) || [];

let banca = 0;
let totalApostado = 0;
let wins = 0;

function salvar(){
localStorage.setItem("bets", JSON.stringify(bets));
}

function addBet(){

let valor = parseFloat(document.getElementById("valor").value);
let odd = parseFloat(document.getElementById("odd").value);
let resultado = document.getElementById("resultado").value;

let lucro = 0;

if(resultado=="win"){
lucro = valor * odd - valor;
wins++;
}else{
lucro = -valor;
}

bets.push({valor,odd,resultado,lucro});

salvar();

render();

}

function render(){

banca = 0;
totalApostado = 0;
wins = 0;

let tabela = "";

let historicoBanca = [];

bets.forEach((bet,i)=>{

banca += bet.lucro;
totalApostado += bet.valor;

if(bet.resultado=="win") wins++;

historicoBanca.push(banca);

tabela += `
<tr>
<td>${i+1}</td>
<td>${bet.valor}</td>
<td>${bet.odd}</td>
<td>${bet.resultado}</td>
<td>${bet.lucro.toFixed(2)}</td>
</tr>
`;

});

document.getElementById("tabela").innerHTML = tabela;

let roi = totalApostado>0 ? (banca/totalApostado)*100 : 0;
let winrate = bets.length>0 ? (wins/bets.length)*100 : 0;

document.getElementById("banca").innerText = banca.toFixed(2);
document.getElementById("lucro").innerText = banca.toFixed(2);
document.getElementById("roi").innerText = roi.toFixed(2)+"%";
document.getElementById("winrate").innerText = winrate.toFixed(2)+"%";

criarGrafico(historicoBanca);

}

let chart;

function criarGrafico(data){

if(chart) chart.destroy();

chart = new Chart(document.getElementById("grafico"),{
type:"line",
data:{
labels:data.map((_,i)=>i+1),
datasets:[{
label:"Banca",
data:data
}]
}
});

}

render();

</script>

</body>
</html>
