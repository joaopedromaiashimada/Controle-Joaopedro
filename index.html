<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Gestão Profissional de Apostas</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,select,button{
padding:8px;
margin:5px;
border-radius:5px;
border:none;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

.stats{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.stat{
background:#020617;
padding:15px;
border-radius:8px;
flex:1;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #334155;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>Gestão Profissional de Apostas</h1>

<div class="card">

<h3>Banca inicial</h3>

<input id="bancaInicial" type="number" placeholder="Digite sua banca">

<button onclick="salvarBanca()">Salvar</button>

</div>

<div class="card">

<h3>Registrar aposta</h3>

Valor
<input id="valor" type="number">

Odd
<input id="odd" type="number" step="0.01">

Esporte
<input id="esporte" type="text">

Casa
<input id="casa" type="text">

Tipo
<input id="tipo" type="text">

Resultado
<select id="resultado">
<option value="win">Win</option>
<option value="loss">Loss</option>
</select>

<button onclick="addBet()">Adicionar</button>

</div>

<div class="stats">

<div class="stat">
<h3>Banca Atual</h3>
<p id="banca">0</p>
</div>

<div class="stat">
<h3>Lucro</h3>
<p id="lucro">0</p>
</div>

<div class="stat">
<h3>ROI</h3>
<p id="roi">0%</p>
</div>

<div class="stat">
<h3>Winrate</h3>
<p id="winrate">0%</p>
</div>

</div>

<div class="card">

<h3>Evolução da banca</h3>

<canvas id="grafico"></canvas>

</div>

<div class="card">

<h3>Histórico</h3>

<button onclick="exportar()">Exportar Excel</button>

<table>

<thead>

<tr>
<th>#</th>
<th>Esporte</th>
<th>Casa</th>
<th>Tipo</th>
<th>Valor</th>
<th>Odd</th>
<th>Resultado</th>
<th>Lucro</th>
<th>Ação</th>
</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>

</div>

<script>

let bets = JSON.parse(localStorage.getItem("bets")) || [];
let bancaInicial = parseFloat(localStorage.getItem("bancaInicial")) || 0;

function salvarBanca(){

bancaInicial = parseFloat(document.getElementById("bancaInicial").value);
localStorage.setItem("bancaInicial", bancaInicial);
render();

}

function addBet(){

let valor = parseFloat(document.getElementById("valor").value);
let odd = parseFloat(document.getElementById("odd").value);
let esporte = document.getElementById("esporte").value;
let casa = document.getElementById("casa").value;
let tipo = document.getElementById("tipo").value;
let resultado = document.getElementById("resultado").value;

let lucro = resultado=="win" ? valor*odd-valor : -valor;

bets.push({valor,odd,resultado,lucro,esporte,casa,tipo});

localStorage.setItem("bets",JSON.stringify(bets));

render();

}

function deletar(i){

bets.splice(i,1);

localStorage.setItem("bets",JSON.stringify(bets));

render();

}

function exportar(){

let csv="esporte,casa,tipo,valor,odd,resultado,lucro\n";

bets.forEach(b=>{
csv+=`${b.esporte},${b.casa},${b.tipo},${b.valor},${b.odd},${b.resultado},${b.lucro}\n`;
});

let blob=new Blob([csv]);
let a=document.createElement("a");

a.href=URL.createObjectURL(blob);
a.download="apostas.csv";

a.click();

}

let chart;

function render(){

let banca=bancaInicial;
let totalApostado=0;
let wins=0;

let tabela="";
let historico=[];

bets.forEach((bet,i)=>{

banca+=bet.lucro;

totalApostado+=bet.valor;

if(bet.resultado=="win") wins++;

historico.push(banca);

tabela+=`

<tr>

<td>${i+1}</td>
<td>${bet.esporte}</td>
<td>${bet.casa}</td>
<td>${bet.tipo}</td>
<td>${bet.valor}</td>
<td>${bet.odd}</td>
<td>${bet.resultado}</td>
<td>${bet.lucro.toFixed(2)}</td>

<td>
<button onclick="deletar(${i})">X</button>
</td>

</tr>

`;

});

document.getElementById("tabela").innerHTML=tabela;

let lucro=banca-bancaInicial;

let roi=totalApostado>0 ? (lucro/totalApostado)*100 : 0;

let winrate=bets.length>0 ? (wins/bets.length)*100 : 0;

document.getElementById("banca").innerText=banca.toFixed(2);
document.getElementById("lucro").innerText=lucro.toFixed(2);
document.getElementById("roi").innerText=roi.toFixed(2)+"%";
document.getElementById("winrate").innerText=winrate.toFixed(2)+"%";

if(chart) chart.destroy();

chart=new Chart(document.getElementById("grafico"),{

type:"line",

data:{

labels:historico.map((_,i)=>i+1),

datasets:[{
label:"Banca",
data:historico
}]

}

});

}

render();

</script>

</body>
</html>
