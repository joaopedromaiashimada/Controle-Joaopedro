<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gestão Profissional de Apostas</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;
}

.stat{
background:#020617;
padding:20px;
border-radius:10px;
text-align:center;
}

input,select,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#calendar{
background:white;
color:black;
border-radius:10px;
padding:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Gestão Profissional de Apostas</h1>

<div class="card">

<h3>Banca inicial</h3>

<input type="number" id="bancaInicial" placeholder="Digite sua banca">
<button onclick="salvarBanca()">Salvar</button>

</div>

<div class="card">

<h3>Registrar aposta</h3>

<input type="number" id="valor" placeholder="Valor">
<input type="number" id="odd" placeholder="Odd">

<select id="resultado">
<option value="win">Win</option>
<option value="loss">Loss</option>
</select>

<button onclick="adicionarAposta()">Adicionar</button>

</div>

<div class="card">

<h3>Controle diário</h3>

<input type="number" id="metaDiaria" placeholder="Meta diária">

<input type="number" id="stopLoss" placeholder="Stop loss diário">

<button onclick="salvarControle()">Salvar</button>

<p>Lucro hoje: <span id="lucroHoje">0</span></p>

<p>Status: <span id="statusDia">Sem dados</span></p>

</div>

<div class="stats">

<div class="stat">
<h3>Banca</h3>
<p id="bancaAtual">0</p>
</div>

<div class="stat">
<h3>Lucro</h3>
<p id="lucro">0</p>
</div>

<div class="stat">
<h3>ROI</h3>
<p id="roi">0%</p>
</div>

<div class="stat">
<h3>Winrate</h3>
<p id="winrate">0%</p>
</div>

</div>

<div class="card">

<h3>Evolução da banca</h3>

<canvas id="grafico"></canvas>

</div>

<div class="card">

<h3>Calendário de resultados</h3>

<div id="calendar"></div>

</div>

</div>

<script>

let bancaInicial = Number(localStorage.getItem("bancaInicial")) || 0
let apostas = JSON.parse(localStorage.getItem("apostas")) || []

let metaDiaria = Number(localStorage.getItem("metaDiaria")) || 0
let stopLoss = Number(localStorage.getItem("stopLoss")) || 0

document.getElementById("bancaInicial").value = bancaInicial
document.getElementById("metaDiaria").value = metaDiaria
document.getElementById("stopLoss").value = stopLoss

function salvarBanca(){

bancaInicial = Number(document.getElementById("bancaInicial").value)

localStorage.setItem("bancaInicial", bancaInicial)

render()

}

function salvarControle(){

metaDiaria = Number(document.getElementById("metaDiaria").value)
stopLoss = Number(document.getElementById("stopLoss").value)

localStorage.setItem("metaDiaria", metaDiaria)
localStorage.setItem("stopLoss", stopLoss)

render()

}

function adicionarAposta(){

let valor = Number(document.getElementById("valor").value)
let odd = Number(document.getElementById("odd").value)
let resultado = document.getElementById("resultado").value

apostas.push({valor,odd,resultado})

localStorage.setItem("apostas",JSON.stringify(apostas))

render()

}

function calcular(){

let banca = bancaInicial
let totalInvestido = 0
let wins = 0
let historico = [banca]

apostas.forEach(aposta=>{

totalInvestido += aposta.valor

if(aposta.resultado=="win"){

let lucro = aposta.valor*(aposta.odd-1)

banca += lucro

wins++

}else{

banca -= aposta.valor

}

historico.push(banca)

})

let lucro = banca - bancaInicial

let roi = totalInvestido>0 ? (lucro/totalInvestido)*100 : 0

let winrate = apostas.length>0 ? (wins/apostas.length)*100 : 0

return {banca,lucro,roi,winrate,historico}

}

let chart

function render(){

let dados = calcular()

document.getElementById("bancaAtual").innerText = dados.banca.toFixed(2)
document.getElementById("lucro").innerText = dados.lucro.toFixed(2)
document.getElementById("roi").innerText = dados.roi.toFixed(2)+"%"
document.getElementById("winrate").innerText = dados.winrate.toFixed(2)+"%"

document.getElementById("lucroHoje").innerText = dados.lucro.toFixed(2)

if(dados.lucro >= metaDiaria){

document.getElementById("statusDia").innerText = "Meta batida ✅"

}else if(dados.lucro <= -stopLoss){

document.getElementById("statusDia").innerText = "Stop loss atingido 🛑"

}else{

document.getElementById("statusDia").innerText = "Operando"

}

if(chart){
chart.destroy()
}

chart = new Chart(document.getElementById("grafico"),{

type:"line",

data:{

labels:dados.historico.map((_,i)=>i),

datasets:[{

label:"Banca",

data:dados.historico,

borderWidth:3

}]

}

})

}

render()

document.addEventListener('DOMContentLoaded', function () {

let calendarEl = document.getElementById('calendar');

let calendar = new FullCalendar.Calendar(calendarEl, {

initialView: 'dayGridMonth',

dateClick: function(info) {

let valor = prompt("Lucro ou prejuízo do dia:");

if(valor){

calendar.addEvent({

title: "R$ " + valor,

start: info.dateStr

})

}

}

});

calendar.render();

});

</script>

</body>
</html>
